<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aria AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass-panel fade-in">
            <h2 class="text-center mb-1">Welcome Back</h2>
            <p class="text-center text-muted mb-4">Login to your Aria account</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
                <div id="loginError" class="text-danger mb-3 d-none text-center" style="color: var(--danger); font-size: 0.9rem;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            
            <p class="text-center mt-4" style="font-size: 0.9rem;">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
