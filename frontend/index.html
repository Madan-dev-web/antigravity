<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria | Personal AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-panel text-center fade-in" style="max-width: 600px;">
            <div class="mb-4">
                <span style="font-size: 4rem;">✨</span>
            </div>
            <h1 class="mb-2" style="font-size: 3rem;">Meet <span class="gradient-text">Aria</span></h1>
            <p class="text-muted mb-4" style="font-size: 1.2rem;">Your intelligent personal assistant for productivity, voice transcription, and career growth.</p>
            
            <div class="stats-grid mb-4" style="text-align: left;">
                <div class="stat-card" style="padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px;">
                    <h4>🎙️ Voice AI</h4>
                    <p class="text-muted" style="font-size: 0.9rem;">Record & transcribe audio instantly</p>
                </div>
                <div class="stat-card" style="padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px;">
                    <h4>🧠 Smart Chat</h4>
                    <p class="text-muted" style="font-size: 0.9rem;">AI companion for daily tasks</p>
                </div>
                <div class="stat-card" style="padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px;">
                    <h4>📄 ATS Helper</h4>
                    <p class="text-muted" style="font-size: 0.9rem;">Optimize your resume for jobs</p>
                </div>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="register.html" class="btn btn-primary" style="min-width: 150px;">Get Started</a>
                <a href="login.html" class="btn btn-outline" style="min-width: 150px;">Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
